name: Bug Report
description: Report a bug in dspy-guardrails
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the behavior.
      placeholder: |
        ```python
        from dspy_guardrails import Shield
        shield = Shield()
        result = shield.check("...")
        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `pip show dspy-guardrails | grep Version`"
      placeholder: "0.5.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
