# AI Security Scan Workflow
# Generated by dspy-guardrails
# Copy this file to .github/workflows/security-scan.yml

name: AI Security Scan

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      threshold:
        description: 'Block rate threshold (0-100)'
        required: false
        default: '80'
      preset:
        description: 'Security preset'
        required: false
        default: 'quick-scan'
        type: choice
        options:
          - quick-scan
          - owasp:llm
          - mitre:atlas

env:
  PYTHON_VERSION: '3.11'
  CONFIG_PATH: 'promptfoo.yaml'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dspy-guardrails
        run: |
          pip install --upgrade pip
          pip install dspy-guardrails

      - name: Initialize config (if not exists)
        run: |
          if [ ! -f "${{ env.CONFIG_PATH }}" ]; then
            PRESET=${{ github.event.inputs.preset || 'quick-scan' }}
            dspy-guardrails redteam init --preset $PRESET -o ${{ env.CONFIG_PATH }}
          fi

      - name: Run security scan
        id: scan
        continue-on-error: true
        run: |
          THRESHOLD=${{ github.event.inputs.threshold || '80' }}
          THRESHOLD_DECIMAL=$(echo "scale=2; $THRESHOLD / 100" | bc)

          dspy-guardrails redteam run \
            --config ${{ env.CONFIG_PATH }} \
            --threshold $THRESHOLD_DECIMAL \
            --format json \
            --output ./results

          # Store results for later steps
          if [ -f "./results/results.json" ]; then
            echo "results_exist=true" >> $GITHUB_OUTPUT
            BLOCK_RATE=$(jq -r '.block_rate' ./results/results.json)
            VULNERABILITIES=$(jq '.vulnerabilities | length' ./results/results.json)
            echo "block_rate=$BLOCK_RATE" >> $GITHUB_OUTPUT
            echo "vulnerabilities=$VULNERABILITIES" >> $GITHUB_OUTPUT
          fi

      - name: Check threshold
        id: check
        run: |
          THRESHOLD=${{ github.event.inputs.threshold || '80' }}
          dspy-guardrails ci check \
            --results ./results/results.json \
            --threshold $THRESHOLD \
            --format github

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.scan.outputs.results_exist == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const blockRate = '${{ steps.scan.outputs.block_rate }}';
            const vulnerabilities = '${{ steps.scan.outputs.vulnerabilities }}';
            const passed = parseFloat(blockRate) >= 0.8;
            const status = passed ? ':white_check_mark: PASSED' : ':x: FAILED';

            const body = `## AI Security Scan ${status}

            | Metric | Value |
            |--------|-------|
            | Block Rate | ${blockRate} |
            | Vulnerabilities | ${vulnerabilities} |
            | Threshold | 80% |

            ${parseInt(vulnerabilities) > 0 ? '\n:warning: **Review vulnerabilities in the detailed report.**' : ':shield: No critical vulnerabilities found.'}

            <details>
            <summary>View Details</summary>

            Download the full report from the [workflow artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            </details>

            ---
            *Powered by [dspy-guardrails](https://github.com/yourusername/dspy-guardrails)*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results-${{ github.run_number }}
          path: results/
          retention-days: 30

      - name: Upload SARIF (if available)
        if: always() && hashFiles('./results/results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./results/results.sarif
          category: ai-security

      - name: Set final status
        if: steps.check.outcome == 'failure'
        run: |
          echo "::error::Security scan failed. Block rate below threshold."
          exit 1
